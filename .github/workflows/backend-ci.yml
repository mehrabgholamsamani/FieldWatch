name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'packages/backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  lint-typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: packages/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check .

      - name: Mypy type-check
        run: mypy app/

  test:
    name: Tests (pytest + coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/backend

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: fieldwatch
          POSTGRES_PASSWORD: fieldwatch
          POSTGRES_DB: fieldwatch_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://fieldwatch:fieldwatch@localhost:5432/fieldwatch_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: test-secret-key
      JWT_ACCESS_EXPIRE_MINUTES: '15'
      JWT_REFRESH_EXPIRE_DAYS: '7'
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_S3_BUCKET: test-bucket
      AWS_REGION: eu-north-1
      NOMINATIM_USER_AGENT: fieldwatch-ci
      FIREBASE_CREDENTIALS_JSON: '{}'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: packages/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run pytest with coverage
        run: |
          pytest -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: packages/backend/.coverage
