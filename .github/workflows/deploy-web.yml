name: Deploy Web Frontend

on:
  push:
    branches: [main]
    paths:
      - 'packages/mobile/**'
      - '.github/workflows/deploy-web.yml'

jobs:
  deploy:
    name: Build & Deploy Web
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: packages/mobile/package-lock.json

      - name: Install dependencies
        working-directory: packages/mobile
        run: npm ci

      - name: Build web app
        working-directory: packages/mobile
        env:
          EXPO_PUBLIC_API_URL: https://api.fieldwatch.mehrabdev.com/v1
        run: npx expo export --platform web

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$EC2_SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key" \
            packages/mobile/dist/ \
            $EC2_USER@$EC2_HOST:/tmp/fieldwatch-web/
          ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key $EC2_USER@$EC2_HOST << 'EOF'
            sudo rm -rf /var/www/fieldwatch-web/*
            sudo cp -r /tmp/fieldwatch-web/* /var/www/fieldwatch-web/
            sudo chown -R www-data:www-data /var/www/fieldwatch-web
          EOF
          rm -f /tmp/deploy_key
