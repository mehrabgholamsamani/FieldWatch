name: Mobile CI

on:
  push:
    branches: [main]
    paths:
      - 'packages/mobile/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/mobile/**'
      - '.github/workflows/mobile-ci.yml'

jobs:
  lint-typecheck-test:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/mobile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: packages/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npx eslint src/

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Jest tests
        run: npm test -- --coverage --coverageThreshold='{"global":{"lines":70}}'
